root = "backend"
tmp_dir = "backend/tmp"

[build]
  # 命令：构建应用
  cmd = "go build -o ./tmp/main ."
  # 二进制文件路径
  bin = "tmp/main"
  # 监听的文件扩展名
  include_ext = ["go", "yaml", "yml"]
  # 忽略的文件扩展名
  exclude_ext = ["tmp"]
  # 监听的目录
  include_dir = []
  # 忽略的目录
  exclude_dir = ["tmp", "vendor", "frontend", "node_modules", "logs"]
  # 忽略的文件
  exclude_file = []
  # 忽略的正则
  exclude_regex = ["_test.go"]
  # 延迟时间（毫秒）
  delay = 1000
  # 遇到错误时停止
  stop_on_error = true
  # 日志文件
  log = "build-errors.log"

[log]
  # 显示时间
  time = true
  # 只显示主日志
  main_only = false

[color]
  # 自定义每个部分显示的颜色
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  # 退出时删除tmp目录
  clean_on_exit = true
