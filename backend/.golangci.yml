linters:
  # 启用的linters
  enable:
    - gofmt         # 格式检查
    - goimports     # import排序
    - govet         # vet检查
    - staticcheck   # 静态分析
    - unused        # 检查未使用的代码
    - gosimple      # 简化代码建议
    - ineffassign   # 检查无效赋值
    - deadcode      # 检查未使用的代码
    - varcheck      # 检查未使用的全局变量和常量
    - structcheck   # 检查未使用的结构体字段
    - errcheck      # 检查错误处理
    - typecheck     # 类型检查
    - gosec         # 安全检查

linters-settings:
  govet:
    check-shadowing: true  # 检查变量遮蔽

  gofmt:
    simplify: true  # 简化代码

  gocyclo:
    min-complexity: 15  # 复杂度阈值

  maligned:
    suggest-new: true

  dupl:
    threshold: 100

  goconst:
    min-len: 2
    min-occurrences: 3

  misspell:
    locale: US

  lll:
    line-length: 140
    tab-width: 1

  goimports:
    local-prefixes: oneops/backend

  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style

run:
  # 超时时间
  timeout: 5m

  # 测试包含文件
  tests: true

  # 出现错误时退出
  issues-exit-code: 1

  # 排除的目录
  skip-dirs:
    - vendor
    - tmp
    - frontend
    - node_modules

  # 排除的文件
  skip-files:
    - ".*\\.test\\.go"

# 输出配置
output:
  # 格式：colored-line-number|json|tab|checkstyle|code-climate
  format: colored-line-number

  # 打印linter名称
  print-linter-name: true

  # 排序结果
  sort-results: true

# 问题配置
issues:
  # 显示所有问题
  max-issues-per-linter: 0
  max-same-issues: 0

  # 排除特定问题
  exclude-rules:
    # 测试文件中允许更多灵活性
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - dupl
        - gosec
        - goconst

    # main.go中允许某些问题
    - path: main\.go
      linters:
        - gocyclo

  # 排除默认的exclude列表
  exclude-use-default: false
